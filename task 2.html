<!DOCTYPE html>
<html>
<head>
<title>Chat App</title>

<style>
body{font-family:Arial;background:#121212;color:white;text-align:center;}
.box{width:400px;margin:auto;background:#1e1e1e;padding:20px;border-radius:10px;}
.chat{height:300px;overflow:auto;background:black;padding:10px;margin-bottom:10px;}
input,button{padding:10px;width:80%;}
button{background:#00ff99;border:none;cursor:pointer;}
.msg{background:#2d2d2d;margin:5px;padding:5px;border-radius:5px;}
</style>
</head>
<body>

<div class="box">

<h2>Chat Room</h2>

<div class="chat" id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

</div>

<script>
function sendMsg(){
    let m = msg.value;

    if(m==="") return;

    chat.innerHTML += `<div class="msg">${m}</div>`;

    msg.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
