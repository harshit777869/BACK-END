<!DOCTYPE html>
<html>
<head>
<title>E-commerce</title>

<style>
body{font-family:Arial;background:#121212;color:white;text-align:center;}
.container{width:400px;margin:auto;background:#1e1e1e;padding:20px;border-radius:10px;}
.product{background:#2d2d2d;margin:10px;padding:10px;border-radius:8px;}
button{background:#00ff99;border:none;padding:8px;cursor:pointer;}
</style>
</head>
<body>

<div class="container">

<h2>Products</h2>

<div id="list"></div>

<h3>Cart: <span id="cartCount">0</span></h3>

</div>

<script>
let cart = 0;

let products = [
    {name:"Phone",price:10000},
    {name:"Laptop",price:50000},
    {name:"Headphones",price:2000}
];

function render(){
    list.innerHTML = "";

    products.forEach(p=>{
        list.innerHTML += `
        <div class="product">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addCart()">Add to Cart</button>
        </div>
        `;
    });
}

function addCart(){
    cart++;
    cartCount.innerText = cart;
}

render();
</script>

</body>
</html>
